<body>
    <div id="app"></div>

    <script>
    window.ElMessage = window.ElMessage || (ElementPlus && ElementPlus.ElMessage);
    window.ElMessageBox = window.ElMessageBox || (ElementPlus && ElementPlus.ElMessageBox);
    if (window.ElMessage) {
        if (!window.ElMessage.success) {
            window.ElMessage.success = function(m) { return window.ElMessage({ message: m, type: 'success', offset: 60 }); };
            window.ElMessage.error = function(m) { return window.ElMessage({ message: m, type: 'error', offset: 60 }); };
            window.ElMessage.info = function(m) { return window.ElMessage({ message: m, type: 'info', offset: 60 }); };
            window.ElMessage.warning = function(m) { return window.ElMessage({ message: m, type: 'warning', offset: 60 }); };
        }
    }
    </script>
